<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Calculator</title>
    <link href="./styles.css" rel="stylesheet">
    <script src="./script.js" defer></script>
  </head>
  <body>
    <h1>Calculator</h1>
    <div class="calculator">
      <div class="display"></div>
      <div class="row">
        <button type="button" class="clear">Clear</button>
        <button type="button" class="backspace">&#129064</button>
      </div>
      <div class="button-pad">
        <div class="numpad">
          <div class="row">
            <button type="button" class="number" id="seven">7</button>
            <button type="button" class="number" id="eight">8</button>
            <button type="button" class="number" id="nine">9</button>
          </div>
          <div class="row">
            <button type="button" class="number" id="four">4</button>
            <button type="button" class="number" id="five">5</button>
            <button type="button" class="number" id="six">6</button>
          </div>
          <div class="row">
            <button type="button" class="number" id="one">1</button>
            <button type="button" class="number" id="two">2</button>
            <button type="button" class="number" id="three">3</button>
          </div>
          <div class="row">
            <button type="button" class="number" id="zero">0</button>
            <button type="button" class="number" id="dot">.</button>
          </div>
        </div>
        <div class="operators">
          <div class="row">
            <button type="button" class="operator" id="add">&plus;</button>
            <button type="button" class="operator" id="subtract">&minus;</button>
          </div>
          <div class="row">
            <button type="button" class="operator" id="multiply">&times</button>
            <button type="button" class="operator" id="divide">&divide</button>
          </div>
          <div class="row">
            <button type="button" class="operator" id="equals">=</button>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
